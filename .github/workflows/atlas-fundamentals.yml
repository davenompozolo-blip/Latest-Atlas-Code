name: ATLAS Fundamentals Sync

# Populates equity_cache with overview fundamentals (P/E, PEG, Beta,
# analyst targets, next earnings date) for every portfolio holding so the
# Nexus valuation columns light up.
#
# TWO paths — whichever secrets are available will run:
#   Path A (Edge Function): calls the sync_fundamentals Supabase Edge Function
#     directly — uses FINNHUB_API_KEY stored in Supabase secrets. No
#     ATLAS_API_BASE required. Preferred path.
#   Path B (Node script): drives the deployed /api/equity Vercel endpoint.
#     Requires ATLAS_API_BASE secret to be set in this repo.
#
# Required secrets:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY — always required
#   SUPABASE_FUNCTIONS_URL — your project's Edge Function base URL
#     (e.g. https://<ref>.supabase.co/functions/v1)
#
# Optional secrets (enable Path B):
#   ATLAS_API_BASE — deployed Vercel app URL (e.g. https://your-atlas.vercel.app)

on:
  schedule:
    # 7:30 AM ET (12:30 UTC) weekdays — before the morning Alpaca sync
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Invoke Edge Function (Path A — preferred)
        if: ${{ secrets.SUPABASE_FUNCTIONS_URL != '' }}
        env:
          SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "[fundamentals] Invoking sync_fundamentals Edge Function..."
          RESULT=$(curl -s -X POST \
            "${SUPABASE_FUNCTIONS_URL}/sync_fundamentals" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 600)
          echo "$RESULT" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Symbols: {d.get(\"symbols\",0)}  Enriched: {d.get(\"enriched\",0)}  Failed: {d.get(\"failed\",0)}  Elapsed: {d.get(\"elapsed_s\",0)}s')
          " || echo "$RESULT"

      - name: Setup Node (Path B fallback)
        if: ${{ secrets.ATLAS_API_BASE != '' && secrets.SUPABASE_FUNCTIONS_URL == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Path B fallback)
        if: ${{ secrets.ATLAS_API_BASE != '' && secrets.SUPABASE_FUNCTIONS_URL == '' }}
        run: npm install --prefer-offline

      - name: Run Node fundamentals sync (Path B fallback)
        if: ${{ secrets.ATLAS_API_BASE != '' && secrets.SUPABASE_FUNCTIONS_URL == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ATLAS_API_BASE: ${{ secrets.ATLAS_API_BASE }}
          FUNDAMENTALS_THROTTLE_MS: '1500'
        run: node scripts/sync-fundamentals.mjs
