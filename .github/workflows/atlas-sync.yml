name: ATLAS Sync

on:
  schedule:
    # Market days: 30 min after close (4:30 PM ET = 21:30 UTC)
    - cron: '30 21 * * 1-5'
    # Morning pre-market check (8:00 AM ET = 13:00 UTC)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync type to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - positions
          - account_snapshot
          - transactions
          - price_history
          - equity_curve
          - validation_only

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # npm ci requires a lockfile; use install with --prefer-offline if cache hit
        run: npm install --prefer-offline

      - name: Run ATLAS Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_API_URL: ${{ secrets.ALPACA_API_URL }}
          SYNC_TYPE: ${{ inputs.sync_type || 'full' }}
        run: node scripts/sync-wrapper.mjs

      - name: Log failure to Supabase on error
        if: failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -s -X POST "${SUPABASE_URL}/rest/v1/atlas_memory" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{
              \"category\": \"bug\",
              \"key\": \"github-actions-sync-failure\",
              \"content\": \"GitHub Actions sync #${{ github.run_id }} failed at $(date -u +%Y-%m-%dT%H:%M:%SZ). Branch: ${{ github.ref_name }}. Check Actions logs.\",
              \"tags\": [\"sync\", \"github-actions\", \"failure\", \"critical\"],
              \"priority\": 2,
              \"source\": \"auto-sync\"
            }" || true
