# ATLAS Terminal — Secrets Configuration
# Copy this file to .streamlit/secrets.toml and fill in your actual values.
# NEVER commit secrets.toml to git.

# ── Authentication ──────────────────────────────────────────────
[auth]
cookie_name  = "atlas_auth"
cookie_key   = "CHANGE-ME-to-a-random-32-char-string"

[auth.credentials.hlobo]
name     = "Hlobo Nompozolo"
email    = "hlobo@riscura.com"
password = "$2b$12$REPLACE_WITH_BCRYPT_HASH"
tier     = "admin"

[auth.credentials.analyst_demo]
name     = "Demo Analyst"
email    = "demo@riscura.com"
password = "$2b$12$REPLACE_WITH_BCRYPT_HASH"
tier     = "analyst"

# ── API Keys ────────────────────────────────────────────────────
[api_keys]
fred           = "YOUR_FRED_API_KEY"
alpha_vantage  = "YOUR_ALPHA_VANTAGE_API_KEY"
fmp            = "YOUR_FMP_API_KEY"

# ── Broker Integration ──────────────────────────────────────────
[alpaca]
api_key    = "YOUR_ALPACA_API_KEY"
secret_key = "YOUR_ALPACA_SECRET_KEY"

# ── Other ───────────────────────────────────────────────────────
[integrations]
investopedia_email = "your.email@example.com"
