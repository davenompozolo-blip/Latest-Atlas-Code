<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATLAS — Project Status</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #2a2a2a;
      --text:      #e2e2e2;
      --text-dim:  #888888;
      --text-muted:#444444;
      --green:     #00ff88;
      --amber:     #ffaa00;
      --red:       #ff4444;
      --blue:      #4d9aff;
      --font:      'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    #app { display: flex; flex-direction: column; height: 100vh; }

    .gradient-line {
      height: 2px;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--red), var(--amber));
      flex-shrink: 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .title { font-weight: 700; font-size: 13px; letter-spacing: 3px; }
    .sep   { color: var(--text-muted); }
    .subtitle { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }

    .fetch-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      flex-shrink: 0; transition: background 0.2s;
    }
    .fetch-dot.fetching { animation: pulse 0.7s ease-in-out infinite; }
    .fetch-dot.error    { background: var(--red); box-shadow: 0 0 6px var(--red); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    .header-right { display: flex; align-items: center; gap: 14px; }
    .last-sync { font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }
    .last-sync.stale { color: var(--amber); }

    .refresh-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); font-family: var(--font);
      font-size: 10px; letter-spacing: 1px;
      padding: 4px 10px; cursor: pointer; border-radius: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover  { border-color: var(--green); color: var(--green); }
    .refresh-btn:active { opacity: 0.7; }

    /* ── Panels ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      flex: 1; min-height: 0; overflow: hidden;
    }
    .panel {
      background: var(--surface);
      padding: 14px 16px;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .panel-header {
      font-size: 10px; letter-spacing: 0.15em;
      color: var(--text-dim); text-transform: uppercase;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 12px; flex-shrink: 0;
    }

    /* ── Badge ── */
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .badge.ok       { color: var(--green); }
    .badge.empty    { color: var(--amber); }
    .badge.error    { color: var(--red); }
    .badge.pending  { color: var(--text-dim); }
    .badge.ready    { color: var(--green); }
    .badge.building { color: var(--amber); }
    .badge.failed   { color: var(--red); }
    .badge.canceled { color: var(--text-muted); }

    /* ── Supabase rows ── */
    .view-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .view-row:last-child { border-bottom: none; }
    .view-name  { color: var(--text-dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 58%; }
    .view-meta  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .view-count { font-size: 10px; color: var(--text-muted); }

    /* ── Vercel rows ── */
    .deploy-card { padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .deploy-card:last-child { border-bottom: none; }
    .deploy-card.latest { padding-bottom: 12px; margin-bottom: 2px; }
    .deploy-top  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .deploy-branch  { font-size: 12px; color: var(--text); margin-bottom: 2px; }
    .deploy-message { font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .deploy-meta    { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
    .deploy-time    { font-size: 11px; color: var(--text-muted); }

    /* ── GitHub rows ── */
    .stat-row    { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
    .stat-label  { font-size: 11px; color: var(--text-dim); }
    .stat-value  { font-size: 12px; color: var(--text); }
    .branch-grid { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
    .branch-tag  { font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    .branch-tag.main    { border-color: rgba(0,255,136,0.3); color: var(--green); }
    .branch-tag.feature { border-color: rgba(77,154,255,0.3); color: var(--blue); }

    .commit-row { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .commit-row:last-child { border-bottom: none; }
    .commit-top    { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .commit-sha    { font-size: 11px; color: var(--blue); flex-shrink: 0; }
    .commit-author { font-size: 10px; color: var(--text-muted); }
    .commit-time   { font-size: 10px; color: var(--text-muted); margin-left: auto; flex-shrink: 0; }
    .commit-message { font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .sub-header { font-size: 9px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin: 10px 0 6px; }
    .divider    { height: 1px; background: var(--border); margin: 8px 0; }

    /* ── System log ── */
    .log-section  { background: var(--bg); border-top: 1px solid var(--border); flex-shrink: 0; }
    .log-header   { font-size: 10px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; padding: 5px 16px 4px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .log-feed     { height: 76px; overflow-y: auto; padding: 5px 16px; }
    .log-entry    { font-size: 11px; line-height: 1.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-ts       { color: var(--amber); }
    .log-msg      { color: var(--text-dim); }

    /* ── States ── */
    .loading { color: var(--text-muted); font-size: 12px; }
    .loading::after { content: ''; animation: ellipsis 1.4s steps(4,end) infinite; }
    @keyframes ellipsis { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%,100%{content:'...';} }
    .err-msg { font-size: 11px; color: var(--red); margin-top: 4px; line-height: 1.6; }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
<div id="app">
  <div class="gradient-line"></div>

  <div class="header">
    <div class="header-left">
      <span class="title">ATLAS TERMINAL</span>
      <span class="sep">──</span>
      <span class="subtitle">PROJECT STATUS</span>
      <span id="fetch-dot" class="fetch-dot"></span>
    </div>
    <div class="header-right">
      <span id="last-sync" class="last-sync">last sync: --:--:--</span>
      <button id="refresh-btn" class="refresh-btn">⟳ REFRESH</button>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">SUPABASE VIEWS</div>
      <div id="supabase-content"><span class="loading">Loading</span></div>
    </div>
    <div class="panel">
      <div class="panel-header">VERCEL</div>
      <div id="vercel-content"><span class="loading">Loading</span></div>
    </div>
    <div class="panel">
      <div class="panel-header">GITHUB</div>
      <div id="github-content"><span class="loading">Loading</span></div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">SYSTEM LOG ──────────────────────────────────────</div>
    <div id="log-feed" class="log-feed"></div>
  </div>
</div>

<script>
  // ── Supabase init ─────────────────────────────────────────────
  // SUPABASE_KEY line below is replaced by inject-env.js at Vercel build time.
  const SUPABASE_URL = 'https://vdmojjszvvcithuxwexx.supabase.co';
  const SUPABASE_KEY = '';  // injected at build

  const sb = SUPABASE_KEY
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    : null;

  // ── Config ────────────────────────────────────────────────────
  const VIEWS = [
    'vw_portfolio_home',
    'vw_quant_dashboard',
    'vw_risk_analysis',
    'vw_performance_suite',
    'vw_command_centre',
  ];
  const REFRESH_MS  = 60_000;
  const STALE_MS    = 5 * 60_000;

  let lastSyncTime    = null;
  let refreshTimer    = null;
  let anyFetchError   = false;
  let refreshInFlight = false;

  // ── Utilities ─────────────────────────────────────────────────
  function timeAgo(ts) {
    if (!ts) return '?';
    const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
    if (s < 60)  return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60)  return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24)  return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function fmtDuration(ms) {
    if (!ms || ms <= 0) return null;
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return m > 0 ? m + 'm ' + (s % 60) + 's' : s + 's';
  }

  function nowHMS(d) {
    return (d || new Date()).toTimeString().slice(0, 8);
  }

  function esc(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
  }

  function te(s, n) {
    if (!s) return '';
    const t = n != null && s.length > n ? s.slice(0, n) + '…' : s;
    return esc(t);
  }

  function badge(cls, label) {
    return '<span class="badge ' + cls + '"><span>●</span>' + esc(label) + '</span>';
  }

  function vercelBadge(state) {
    const map = { READY:'ready', BUILDING:'building', ERROR:'error', CANCELED:'canceled', QUEUED:'pending' };
    return badge(map[state] || 'pending', state || 'UNKNOWN');
  }

  // ── Log ───────────────────────────────────────────────────────
  function log(msg) {
    const feed = document.getElementById('log-feed');
    const div  = document.createElement('div');
    div.className = 'log-entry';
    const ts = document.createElement('span');
    ts.className = 'log-ts';
    ts.textContent = '> [' + nowHMS() + ']';
    const body = document.createElement('span');
    body.className = 'log-msg';
    body.textContent = ' ' + msg;
    div.appendChild(ts);
    div.appendChild(body);
    feed.prepend(div);
    while (feed.children.length > 60) feed.removeChild(feed.lastChild);
  }

  function setFetching(active) {
    const dot = document.getElementById('fetch-dot');
    if (active) {
      dot.classList.add('fetching');
      dot.classList.remove('error');
    } else {
      dot.classList.remove('fetching');
      dot.classList.toggle('error', anyFetchError);
    }
  }

  // ── Supabase panel ────────────────────────────────────────────
  async function fetchSupabase() {
    const el = document.getElementById('supabase-content');
    if (!sb) {
      el.innerHTML = badge('error', 'NO CLIENT') + '<div class="err-msg">Supabase client not initialised.<br>Check ATLAS_SUPABASE_KEY in Vercel env vars.</div>';
      log('Supabase: client not initialised — ATLAS_SUPABASE_KEY missing');
      anyFetchError = true;
      return;
    }

    let ok = 0, empty = 0, errs = 0;
    const rows = [];
    for (const view of VIEWS) {
      try {
        const { count, error } = await sb.from(view).select('*', { count: 'exact', head: true });
        if (error) throw error;
        const status = count === 0 ? 'EMPTY' : 'OK';
        if (status === 'OK') ok++; else empty++;
        rows.push({ view, count, status });
      } catch (e) {
        errs++;
        rows.push({ view, count: null, status: 'ERROR' });
      }
    }

    el.innerHTML = rows.map(function(r) {
      return '<div class="view-row">' +
        '<span class="view-name" title="' + esc(r.view) + '">' + esc(r.view.replace('vw_', '')) + '</span>' +
        '<span class="view-meta">' +
        (r.count !== null ? '<span class="view-count">' + r.count.toLocaleString() + ' rows</span>' : '') +
        badge(r.status.toLowerCase(), r.status) +
        '</span></div>';
    }).join('');

    if (errs > 0) anyFetchError = true;
    log('Supabase: ' + ok + '/' + VIEWS.length + ' views OK, ' + empty + ' empty, ' + errs + ' error(s)');
  }

  // ── Vercel panel ──────────────────────────────────────────────
  async function fetchVercel() {
    const el = document.getElementById('vercel-content');
    try {
      const res = await fetch('/api/vercel-status');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      if (data.error) {
        el.innerHTML = badge('error', 'FETCH ERROR') + '<div class="err-msg">' + te(data.error) + '</div>';
        log('Vercel: ' + data.error);
        anyFetchError = true;
        return;
      }

      const deployments = data.deployments || [];
      const latest      = data.latest;

      if (!latest) {
        el.innerHTML = '<span style="color:var(--text-muted);font-size:12px">No deployments found</span>';
        log('Vercel: no deployments returned');
        return;
      }

      const branch   = latest.meta && latest.meta.githubCommitRef   ? latest.meta.githubCommitRef   : '—';
      const message  = latest.meta && latest.meta.githubCommitMessage ? latest.meta.githubCommitMessage : '—';
      const duration = latest.ready && latest.buildingAt ? fmtDuration(latest.ready - latest.buildingAt) : null;

      const prevList = deployments.slice(1, 5).map(function(d) {
        const ref = d.meta && d.meta.githubCommitRef ? d.meta.githubCommitRef : '—';
        return '<div class="deploy-card">' +
          '<div class="deploy-top">' + vercelBadge(d.state) + '<span class="deploy-time">' + timeAgo(d.createdAt) + '</span></div>' +
          '<div class="deploy-branch">⎇ ' + te(ref) + '</div>' +
          '</div>';
      }).join('');

      el.innerHTML =
        '<div class="deploy-card latest">' +
          '<div class="deploy-top">' + vercelBadge(latest.state) + '<span class="deploy-time">' + timeAgo(latest.createdAt) + '</span></div>' +
          '<div class="deploy-branch">⎇ ' + te(branch) + '</div>' +
          '<div class="deploy-message">' + te(message, 44) + '</div>' +
          (duration ? '<div class="deploy-meta">build: ' + esc(duration) + '</div>' : '') +
        '</div>' +
        (prevList ? '<div class="divider"></div>' + prevList : '');

      log('Vercel: latest ' + latest.state + ' on ' + branch + ' (' + timeAgo(latest.createdAt) + ')');
    } catch (e) {
      el.innerHTML = badge('error', 'FETCH ERROR') + '<div class="err-msg">' + te(e.message) + '</div>';
      log('Vercel fetch error: ' + e.message);
      anyFetchError = true;
    }
  }

  // ── GitHub panel ──────────────────────────────────────────────
  async function fetchGitHub() {
    const el = document.getElementById('github-content');
    try {
      const res = await fetch('/api/github-status');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      if (data.error) {
        el.innerHTML = badge('error', 'FETCH ERROR') + '<div class="err-msg">' + te(data.error) + '</div>';
        log('GitHub: ' + data.error);
        anyFetchError = true;
        return;
      }

      const commits  = data.commits  || [];
      const branches = data.branches || [];
      const openPRs  = data.openPRs  || 0;

      const branchTags = branches.slice(0, 12).map(function(b) {
        const cls = b.name === 'main' ? 'main'
          : (b.name.startsWith('feature/') || b.name.startsWith('feat/')) ? 'feature' : '';
        return '<span class="branch-tag ' + cls + '" title="' + esc(b.name) + '">' + te(b.name, 24) + '</span>';
      }).join('');

      const commitRows = commits.map(function(c) {
        return '<div class="commit-row">' +
          '<div class="commit-top">' +
            '<span class="commit-sha">' + esc(c.sha.slice(0, 7)) + '</span>' +
            '<span class="commit-author">' + te(c.author, 14) + '</span>' +
            '<span class="commit-time">' + timeAgo(c.date) + '</span>' +
          '</div>' +
          '<div class="commit-message">' + te(c.message, 50) + '</div>' +
          '</div>';
      }).join('');

      el.innerHTML =
        '<div class="stat-row"><span class="stat-label">branches</span><span class="stat-value">' + branches.length + '</span></div>' +
        '<div class="stat-row"><span class="stat-label">open PRs</span><span class="stat-value" style="color:' + (openPRs > 0 ? 'var(--amber)' : 'var(--green)') + '">' + openPRs + '</span></div>' +
        '<div class="branch-grid">' + branchTags + '</div>' +
        '<div class="divider"></div>' +
        '<div class="sub-header">RECENT COMMITS — MAIN</div>' +
        commitRows;

      log('GitHub: ' + branches.length + ' branches, ' + commits.length + ' recent commits, ' + openPRs + ' open PR(s)');
    } catch (e) {
      el.innerHTML = badge('error', 'FETCH ERROR') + '<div class="err-msg">' + te(e.message) + '</div>';
      log('GitHub fetch error: ' + e.message);
      anyFetchError = true;
    }
  }

  // ── Sync label ────────────────────────────────────────────────
  function updateSyncLabel() {
    if (!lastSyncTime) return;
    const el    = document.getElementById('last-sync');
    const stale = Date.now() - lastSyncTime > STALE_MS;
    el.className   = stale ? 'last-sync stale' : 'last-sync';
    el.textContent = 'last sync: ' + nowHMS(new Date(lastSyncTime));
  }

  // ── Refresh cycle ─────────────────────────────────────────────
  async function fetchAll() {
    if (refreshInFlight) return;
    refreshInFlight = true;
    anyFetchError   = false;
    setFetching(true);
    log('Refreshing all data sources…');
    try {
      await Promise.all([fetchSupabase(), fetchVercel(), fetchGitHub()]);
      lastSyncTime = Date.now();
      updateSyncLabel();
    } finally {
      setFetching(false);
      refreshInFlight = false;
    }
  }

  function scheduleRefresh() {
    clearInterval(refreshTimer);
    refreshTimer = setInterval(fetchAll, REFRESH_MS);
  }

  document.getElementById('refresh-btn').addEventListener('click', function() {
    fetchAll();
    scheduleRefresh();
  });

  setInterval(updateSyncLabel, 30_000);
  fetchAll();
  scheduleRefresh();
</script>
</body>
</html>
