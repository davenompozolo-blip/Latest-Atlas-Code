    <style>
        /* ============================================
           ATLAS Terminal — Design System & Styles
           ============================================ */

        :root {
            --bg: #070814;
            --card: #0d0f1a;
            --card-border: rgba(255, 255, 255, 0.06);
            --cyan: #00d4ff;
            --indigo: #6366f1;
            --violet: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --text: rgba(255, 255, 255, 0.92);
            --text-sec: rgba(255, 255, 255, 0.52);
            --text-muted: rgba(255, 255, 255, 0.28);
        }

        /* === Reset & Base === */

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* === App Layout === */

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* === Top Bar === */

        .top-bar {
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--card);
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
            gap: 20px;
        }

        .top-bar .logo {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(0, 212, 255, 0.1);
        }

        .top-bar .logo-sub {
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

        .top-bar .nav-summary {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .top-bar .nav-pnl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
        }

        .top-bar .sparkline-container {
            width: 120px;
            height: 32px;
        }

        .top-bar .spacer { flex: 1; }

        .top-bar .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .top-bar .status-badge.live {
            background: rgba(16, 185, 129, 0.12);
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .top-bar .status-badge.demo {
            background: rgba(245, 158, 11, 0.12);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        .top-bar .date {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* === Body Layout (sidebar + content) === */

        .body-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* === Left Sidebar Nav === */

        .sidebar {
            width: 180px;
            background: var(--card);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 16px 0;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: none;
            background: none;
            text-align: left;
            transition: all 0.15s ease;
            border-left: 3px solid transparent;
            font-family: 'DM Sans', sans-serif;
        }

        .nav-item:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-item.active {
            color: var(--cyan);
            border-left-color: var(--cyan);
            background: rgba(0, 212, 255, 0.05);
        }

        .nav-item .nav-icon {
            font-size: 14px;
            width: 18px;
            text-align: center;
            opacity: 0.7;
        }

        .nav-item.active .nav-icon { opacity: 1; }

        .nav-item .nav-label {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .nav-item .nav-sublabel {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
        }

        /* === Main Content === */

        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* === Content with Right Sidebar === */

        .content-with-sidebar {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        .content-primary { min-width: 0; }
        .content-sidebar { min-width: 0; }

        @media (max-width: 1100px) {
            .content-with-sidebar {
                grid-template-columns: 1fr;
            }
            .sidebar { display: none; }
        }

        /* === Page Title === */

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* === Metrics Row === */

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        /* === Metric Card === */

        .metric-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }

        .metric-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .metric-card .value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
        }

        .metric-card .sub {
            font-size: 12px;
            color: var(--text-sec);
            margin-top: 4px;
        }

        /* === Card === */

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        /* === Data Table === */

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--card-border);
        }

        .data-table td {
            padding: 10px 12px;
            color: var(--text);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-family: 'JetBrains Mono', monospace;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* === Value Colors === */

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .neutral {
            color: var(--amber);
        }

        /* === Badges === */

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.green {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
        }

        .badge.red {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
        }

        .badge.amber {
            background: rgba(245, 158, 11, 0.15);
            color: var(--amber);
        }

        .badge.blue {
            background: rgba(99, 102, 241, 0.15);
            color: var(--indigo);
        }

        /* === Chart Container === */

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 12px;
        }

        /* === Grid Layouts === */

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        /* === Loading Spinner === */

        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading-spinner::after {
            content: '';
            display: block;
            width: 32px;
            height: 32px;
            margin: 16px auto;
            border: 3px solid var(--card-border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* === States === */

        .error-state {
            text-align: center;
            padding: 40px;
            color: var(--red);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        /* === Health Score === */

        .health-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 28px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .health-score.strong {
            border: 3px solid var(--green);
            color: var(--green);
        }

        .health-score.moderate {
            border: 3px solid var(--amber);
            color: var(--amber);
        }

        .health-score.weak {
            border: 3px solid var(--red);
            color: var(--red);
        }

        /* === Donut Container === */

        .donut-container {
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        /* === Custom Scrollbar === */

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* Firefox scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // === ATLAS TERMINAL — React Application ===
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Supabase Client ---
        const sb = SUPABASE_KEY
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
            : null;

        async function loadView(viewName, fallback = []) {
            if (!sb) return fallback;
            try {
                const { data, error } = await sb.from(viewName).select('*');
                if (error) throw error;
                return data && data.length ? data : fallback;
            } catch (e) {
                console.warn('[ATLAS] ' + viewName + ':', e.message);
                return fallback;
            }
        }

        // --- Formatters ---
        function fmt(n, d = 2) { return n != null ? Number(n).toFixed(d) : '\u2014'; }
        function fmtPct(n) { return n != null ? (Number(n) * 100).toFixed(2) + '%' : '\u2014'; }
        function fmtCurrency(n) {
            if (n == null) return '\u2014';
            return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function cls(val) { return val > 0 ? 'positive' : val < 0 ? 'negative' : ''; }
        function badgeCls(tier) {
            const t = (tier || '').toLowerCase();
            if (t.includes('high') || t.includes('downtrend') || t.includes('overbought') || t.includes('needs')) return 'red';
            if (t.includes('moderate') || t.includes('sideways') || t.includes('amber') || t.includes('expanding')) return 'amber';
            if (t.includes('low') || t.includes('uptrend') || t.includes('oversold') || t.includes('strong') || t.includes('compressing')) return 'green';
            return 'blue';
        }
        function healthCls(score) { return score >= 75 ? 'strong' : score >= 50 ? 'moderate' : 'weak'; }

        // --- Mock Data (fallback when no Supabase key) ---
        const MOCK_POSITIONS = [
            { symbol: 'AAPL', name: 'Apple Inc.', quantity: 50, cost_basis: 178.50, current_price: 195.20, market_value: 9760, unrealised_return_pct: 0.0936, portfolio_weight: 0.082, annualised_vol: 0.28, sharpe_approx: 1.2, is_concentrated: false },
            { symbol: 'MSFT', name: 'Microsoft Corp', quantity: 30, cost_basis: 380.00, current_price: 425.80, market_value: 12774, unrealised_return_pct: 0.1205, portfolio_weight: 0.107, annualised_vol: 0.25, sharpe_approx: 1.5, is_concentrated: true },
            { symbol: 'NVDA', name: 'NVIDIA Corp', quantity: 20, cost_basis: 650.00, current_price: 890.50, market_value: 17810, unrealised_return_pct: 0.3700, portfolio_weight: 0.149, annualised_vol: 0.52, sharpe_approx: 2.1, is_concentrated: true },
            { symbol: 'GOOGL', name: 'Alphabet Inc.', quantity: 40, cost_basis: 140.00, current_price: 162.30, market_value: 6492, unrealised_return_pct: 0.1593, portfolio_weight: 0.054, annualised_vol: 0.30, sharpe_approx: 0.9, is_concentrated: false },
        ];
        const MOCK_COMMAND = { portfolio_nav: 119500, total_invested: 98000, total_return_pct: 0.2194, sharpe_ratio: 1.35, sortino_ratio: 1.82, drawdown_pct: -8.4, dollar_var_95: 2850, atlas_health_score: 72, portfolio_health_status: 'Moderate', position_count: 55, days_of_history: 420, computed_at: new Date().toISOString() };

        // --- Loading Component ---
        function Loading({ text }) {
            return React.createElement('div', { className: 'loading-spinner' }, text || 'Loading data...');
        }

        // --- Empty State ---
        function EmptyState({ message }) {
            return React.createElement('div', { className: 'empty-state' },
                React.createElement('div', { style: { fontSize: 36, marginBottom: 12 } }, '\u26A0'),
                React.createElement('div', null, message || 'No data available \u2014 run Alpaca sync first')
            );
        }

        // --- Config Prompt (shown when no Supabase key) ---
        function ConfigPrompt() {
            return React.createElement('div', { style: { textAlign: 'center', padding: '80px 24px' } },
                React.createElement('div', { style: { fontFamily: 'Syne', fontSize: 32, fontWeight: 800, color: '#00d4ff', marginBottom: 16 } }, 'ATLAS TERMINAL'),
                React.createElement('div', { style: { color: 'rgba(255,255,255,0.52)', marginBottom: 32, maxWidth: 480, margin: '0 auto 32px' } },
                    'Running in demo mode. To connect to live Supabase data, set your anon key:'),
                React.createElement('pre', { style: { background: '#0d0f1a', border: '1px solid rgba(255,255,255,0.06)', borderRadius: 8, padding: 20, textAlign: 'left', maxWidth: 600, margin: '0 auto', fontSize: 13, fontFamily: 'JetBrains Mono', color: 'rgba(255,255,255,0.7)', overflowX: 'auto' } },
                    '\x3Cscript\x3E\nwindow.ATLAS_CONFIG = {\n  supabaseKey: "your-anon-key-here"\n};\n\x3C/script\x3E'),
                React.createElement('div', { style: { color: 'rgba(255,255,255,0.28)', marginTop: 20, fontSize: 12 } }, 'Add the script block above BEFORE the terminal script tag, or deploy with environment injection.')
            );
        }

        // ============================================================
        // TAB 1: PORTFOLIO HOME
        // ============================================================
        function PortfolioHome() {
            var _p = useState(null), positions = _p[0], setPositions = _p[1];
            var _c = useState(null), command = _c[0], setCommand = _c[1];
            var _l = useState(true), loading = _l[0], setLoading = _l[1];
            var donutRef = useRef(null);
            var donutInst = useRef(null);
            var benchRef = useRef(null);
            var benchInst = useRef(null);
            var _n = useState(null), navData = _n[0], setNavData = _n[1];

            useEffect(function() {
                Promise.all([
                    loadView('vw_portfolio_home', MOCK_POSITIONS),
                    loadView('vw_command_centre', [MOCK_COMMAND]),
                    loadView('vw_portfolio_nav_daily', [])
                ]).then(function(res) {
                    setPositions(res[0]);
                    setCommand(res[1][0] || MOCK_COMMAND);
                    setNavData(res[2]);
                    setLoading(false);
                });
            }, []);

            // Donut chart
            useEffect(function() {
                if (!positions || !donutRef.current) return;
                if (donutInst.current) donutInst.current.destroy();
                var top10 = positions.slice(0, 10);
                var totalMv = top10.reduce(function(s, p) { return s + Number(p.market_value || 0); }, 0);
                donutInst.current = new Chart(donutRef.current, {
                    type: 'doughnut',
                    data: {
                        labels: top10.map(function(p) { return p.symbol; }),
                        datasets: [{ data: top10.map(function(p) { return Number(p.market_value) || 0; }),
                            backgroundColor: ['#00d4ff', '#6366f1', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#14b8a6', '#f97316', '#a855f7'],
                            borderWidth: 0 }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '65%',
                        plugins: {
                            legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,0.55)', font: { size: 10, family: 'DM Sans' }, padding: 6, boxWidth: 10, usePointStyle: true } }
                        }
                    },
                    plugins: [{ id: 'centerText', beforeDraw: function(chart) {
                        var ctx = chart.ctx, w = chart.width, h = chart.height;
                        ctx.save();
                        ctx.font = '700 18px JetBrains Mono';
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(fmtCurrency(totalMv), w / 2, h / 2 - 4);
                        ctx.restore();
                    }}]
                });
                return function() { if (donutInst.current) donutInst.current.destroy(); };
            }, [positions]);

            // Benchmark line chart
            useEffect(function() {
                if (!navData || !navData.length || !benchRef.current) return;
                if (benchInst.current) benchInst.current.destroy();
                var sorted = navData.slice().sort(function(a, b) { return new Date(a.price_date) - new Date(b.price_date); });
                var baseNav = sorted[0].nav;
                benchInst.current = new Chart(benchRef.current, {
                    type: 'line',
                    data: {
                        labels: sorted.map(function(d) { return ''; }),
                        datasets: [{
                            label: 'ATLAS',
                            data: sorted.map(function(d) { return ((d.nav / baseNav) - 1) * 100; }),
                            borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,0.05)', borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { display: false },
                            y: { display: true, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 10, family: 'JetBrains Mono' }, callback: function(v) { return v.toFixed(0) + '%'; } } }
                        },
                        plugins: { legend: { display: true, labels: { color: 'rgba(255,255,255,0.5)', font: { size: 10 }, boxWidth: 10, usePointStyle: true } } }
                    }
                });
                return function() { if (benchInst.current) benchInst.current.destroy(); };
            }, [navData]);

            if (loading) return React.createElement(Loading, null);
            var c = command || MOCK_COMMAND;

            return React.createElement('div', null,
                // Metrics Row
                React.createElement('div', { className: 'metrics-row', style: { gridTemplateColumns: 'repeat(4, 1fr)' } },
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'PORTFOLIO NAV'),
                        React.createElement('div', { className: 'value' }, fmtCurrency(c.portfolio_nav)),
                        React.createElement('div', { className: 'sub' }, (c.position_count || positions.length) + ' positions + cash')
                    ),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'INVESTED (EQUITIES)'),
                        React.createElement('div', { className: 'value' }, fmtCurrency(c.total_invested)),
                        React.createElement('div', { className: 'sub' }, 'Market value')
                    ),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'UNREALISED P&L'),
                        React.createElement('div', { className: 'value ' + cls(c.total_return_pct) }, fmtCurrency(c.portfolio_nav - c.total_invested)),
                        React.createElement('div', { className: 'sub ' + cls(c.total_return_pct) }, fmtPct(c.total_return_pct))
                    ),
                    React.createElement('div', { className: 'metric-card' },

                        React.createElement('div', { className: 'logo' }, 'ATLAS'),
                        React.createElement('div', { className: 'logo-sub' }, 'TERMINAL')
                    ),
                    React.createElement('div', { className: 'nav-summary' }, fmtCurrency(c.portfolio_nav)),
                    React.createElement('div', { className: 'nav-pnl ' + cls(pnl) }, pnlStr),
                    React.createElement(TopBarSparkline, { nav: topNav }),
                    React.createElement('div', { className: 'spacer' }),
                    React.createElement('div', { className: 'status-badge ' + (sb ? 'live' : 'demo') },
                        sb ? '\u25CF LIVE DATA' : '\u25CB MOCK DATA'
                    ),
                    React.createElement('div', { className: 'date' },
                        new Date().toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' })
                    )
                ),
                // Body layout (sidebar + content)
                React.createElement('div', { className: 'body-layout' },
                    // Left Sidebar
                    React.createElement('div', { className: 'sidebar' },
                        TABS.map(function(tab) {
                            return React.createElement('button', {
                                key: tab.id,
                                className: 'nav-item' + (activeTab === tab.id ? ' active' : ''),
                                onClick: function() { setActiveTab(tab.id); }
                            },

                                React.createElement('div', null,

                                )
                            );
                        }),
                        React.createElement('div', { className: 'sidebar-footer' },
                            'ATLAS TERMINAL v1.0',
                            React.createElement('br'),
                            '\u00A9 2026 ATLAS'
                        )
                    ),
                    // Main Content
                    React.createElement('div', { className: 'main-content' },
                        !sb ? React.createElement(ConfigPrompt, null) : null,
                        React.createElement(ActiveComponent, null)
                    )
                )
            );
        }

        // --- Mount ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App, null));
    </script>
