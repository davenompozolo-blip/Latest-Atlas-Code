version: '3.8'

services:
  streamlit:
    build: .
    container_name: atlas-streamlit
    ports:
      - "8501:8501"
    restart: unless-stopped
    env_file: .env
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/?health=check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: atlas-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: atlas-scheduler
    restart: unless-stopped
    env_file: .env
