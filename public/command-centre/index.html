<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #070814;
  --card: #0d0f1a;
  --card-hover: #131628;
  --card-active: #1a1d35;
  --text-primary: rgba(255,255,255,0.92);
  --text-secondary: rgba(255,255,255,0.52);
  --text-muted: rgba(255,255,255,0.28);
  --cyan: #00d4ff;
  --violet: #8b5cf6;
  --green: #10b981;
  --amber: #f59e0b;
  --sidebar-w: 240px;
  --topbar-h: 60px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
}

/* ── Gradient top line ── */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--violet), var(--green), var(--amber));
  z-index: 1000;
}

/* ── Top bar ── */
.topbar {
  position: fixed;
  top: 2px; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--card);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 100;
  gap: 12px;
}

.topbar-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--cyan);
  letter-spacing: 2px;
}

.topbar-subtitle {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

.topbar-sep {
  width: 1px;
  height: 24px;
  background: rgba(255,255,255,0.08);
  margin: 0 4px;
}

/* ── Layout ── */
.layout {
  display: flex;
  position: fixed;
  top: calc(2px + var(--topbar-h));
  left: 0; right: 0; bottom: 0;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  gap: 8px;
  overflow-y: auto;
}

.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 4px 8px 8px;
}

.agent-card {
  padding: 12px 14px;
  border-radius: 8px;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  width: 100%;
  outline: none;
}

.agent-card:hover {
  background: var(--card-hover);
}

.agent-card.active {
  background: var(--card-active);
}

.agent-card-name {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.agent-card-desc {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.4;
}

/* ── Main area ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.agent-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.agent-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.agent-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.agent-header-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
}

.agent-header-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.btn-clear {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.btn-clear:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}

/* ── Chat area ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

.chat-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

.chat-empty-icon {
  font-size: 40px;
  opacity: 0.2;
}

.chat-empty-text {
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  line-height: 1.6;
}

/* ── Message bubbles ── */
.msg {
  max-width: 720px;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-user {
  align-self: flex-end;
}

.msg-agent {
  align-self: flex-start;
  width: 100%;
  max-width: 720px;
}

.msg-bubble-user {
  background: rgba(255,255,255,0.06);
  border-radius: 12px 12px 4px 12px;
  padding: 12px 16px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}

.msg-user .msg-time { text-align: right; }

.msg-agent-label {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.msg-agent-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
}

/* ── Prompt block ── */
.prompt-block {
  background: #0a0c16;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  overflow: hidden;
}

.prompt-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.prompt-block-title {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.btn-copy {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn-copy:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text-primary);
}

.btn-copy.copied {
  color: var(--green);
  border-color: var(--green);
}

.prompt-block-body {
  padding: 14px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 360px;
  overflow-y: auto;
}

.prompt-block-body::-webkit-scrollbar { width: 4px; }
.prompt-block-body::-webkit-scrollbar-track { background: transparent; }
.prompt-block-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

/* ── Input area ── */
.input-area {
  padding: 16px 28px 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.input-wrapper {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-field {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 160px;
  transition: border-color 0.15s ease;
}

.input-field::placeholder {
  color: var(--text-muted);
}

.input-field:focus {
  border-color: rgba(255,255,255,0.16);
}

.btn-send {
  height: 44px;
  padding: 0 20px;
  border-radius: 10px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: #070814;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-send:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
}

.btn-send:active {
  transform: translateY(0);
}

.input-hint {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 6px;
  padding-left: 2px;
}

/* ── Responsive: sidebar becomes horizontal tabs ── */
@media (max-width: 768px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    min-width: unset;
    flex-direction: row;
    padding: 10px 12px;
    gap: 6px;
    overflow-x: auto;
    overflow-y: hidden;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .sidebar-label { display: none; }

  .agent-card {
    min-width: 140px;
    flex-shrink: 0;
    border-left: none;
    border-top: 3px solid transparent;
    padding: 8px 12px;
  }

  .agent-card.active {
    border-left: none;
  }

  .agent-card-desc { display: none; }

  .agent-header { padding: 14px 16px 12px; }
  .chat-area { padding: 16px; }
  .input-area { padding: 12px 16px 16px; }
}
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-logo">ATLAS</div>
  <div class="topbar-sep"></div>
  <div class="topbar-subtitle">Command Centre</div>
</header>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Agents</div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="agent-header" id="agentHeader">
      <div class="agent-header-left">
        <div class="agent-icon" id="agentIcon"></div>
        <div>
          <div class="agent-header-name" id="agentName"></div>
          <div class="agent-header-desc" id="agentDesc"></div>
        </div>
      </div>
      <button class="btn-clear" id="btnClear" onclick="clearChat()">Clear Chat</button>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          class="input-field"
          id="inputField"
          placeholder="Ask the agent a question..."
          rows="1"
        ></textarea>
        <button class="btn-send" id="btnSend" onclick="sendMessage()">
          Send <span style="font-size:15px">&#8593;</span>
        </button>
      </div>
      <div class="input-hint">Enter to send &middot; Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
// ── Agent definitions ──
const agents = [
  {
    id: 'archivist',
    name: 'The Archivist',
    specialty: 'project state recall, history tracking, and decision logging',
    description: 'Recalls project history, decisions, and current state',
    color: '#00d4ff',
    icon: '\u{1F4DC}',
    context: 'ATLAS is an investment analytics terminal built on Supabase + React. It tracks ~55 equity positions via Alpaca paper trading. Uses FIFO NAV methodology. Frontend is a single-file React SPA at atlas-terminal.vercel.app. Backend is PostgreSQL views in Supabase. Sync runs via GitHub Actions every 15 minutes.',
    history: []
  },
  {
    id: 'architect',
    name: 'The Architect',
    specialty: 'database schema design, SQL views, and data architecture',
    description: 'Designs database schemas, SQL views, and data architecture',
    color: '#8b5cf6',
    icon: '\u{1F3D7}',
    context: 'ATLAS uses Supabase PostgreSQL with 5 base tables (portfolios, assets, positions, transactions, price_history) and 7 analytics views (vw_portfolio_home, vw_quant_dashboard, vw_risk_analysis, vw_performance_suite, vw_command_centre, vw_portfolio_nav_daily, vw_portfolio_returns_daily). All analytics are computed in SQL views, never in the frontend. FIFO NAV reconstruction lives in vw_portfolio_nav_daily.',
    history: []
  },
  {
    id: 'engineer',
    name: 'The Engineer',
    specialty: 'implementation specifications, code architecture, and deployment pipelines',
    description: 'Generates precise implementation specs for Claude Code',
    color: '#10b981',
    icon: '\u{2699}',
    context: 'Repo: davenompozolo-blip/Latest-Atlas-Code. Frontend: public/index.html (React SPA via CDN). Sync pipeline: sync/run_sync.py (runs in GitHub Actions). Services layer: services/. Streamlit pages (legacy): ui/pages/. Deploy: Vercel static site from public/ directory. Key config: vercel.json, inject-env.js for Supabase key injection.',
    history: []
  },
  {
    id: 'strategist',
    name: 'The Strategist',
    specialty: 'product direction, feature prioritization, and release planning',
    description: 'Guides product direction, feature prioritization, and release planning',
    color: '#f59e0b',
    icon: '\u{1F9ED}',
    context: 'Current state: React terminal deployed to Vercel, Alpaca sync via GitHub Actions cron, Streamlit being retired. Completed: FIFO NAV views, all 7 analytics views, OCC options fix, Vercel deployment architecture. Next: confirm scheduled sync stability, retire Streamlit, add real-time features.',
    history: []
  }
];

let activeAgentId = agents[0].id;

// ── Render sidebar ──
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  // Keep the label
  const label = sidebar.querySelector('.sidebar-label');
  sidebar.innerHTML = '';
  sidebar.appendChild(label);

  agents.forEach(agent => {
    const card = document.createElement('button');
    card.className = 'agent-card' + (agent.id === activeAgentId ? ' active' : '');
    card.style.borderLeftColor = agent.id === activeAgentId ? agent.color : 'transparent';
    card.onclick = () => selectAgent(agent.id);
    card.innerHTML =
      '<div class="agent-card-name" style="color:' + (agent.id === activeAgentId ? agent.color : 'var(--text-primary)') + '">' +
        agent.icon + ' ' + agent.name +
      '</div>' +
      '<div class="agent-card-desc">' + agent.description + '</div>';
    sidebar.appendChild(card);
  });
}

// ── Select agent ──
function selectAgent(id) {
  activeAgentId = id;
  renderSidebar();
  renderHeader();
  renderChat();
  document.getElementById('inputField').focus();
}

// ── Render header ──
function renderHeader() {
  const agent = agents.find(a => a.id === activeAgentId);
  const icon = document.getElementById('agentIcon');
  icon.style.background = agent.color + '18';
  icon.textContent = agent.icon;
  document.getElementById('agentName').textContent = agent.name;
  document.getElementById('agentName').style.color = agent.color;
  document.getElementById('agentDesc').textContent = agent.description;
  document.getElementById('btnSend').style.background = agent.color;
}

// ── Time formatter ──
function formatTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── Render chat ──
function renderChat() {
  const area = document.getElementById('chatArea');
  const agent = agents.find(a => a.id === activeAgentId);

  if (agent.history.length === 0) {
    area.innerHTML =
      '<div class="chat-empty">' +
        '<div class="chat-empty-icon">' + agent.icon + '</div>' +
        '<div class="chat-empty-text">' +
          'Ask <strong style="color:' + agent.color + '">' + agent.name + '</strong> a question.<br>' +
          'A structured prompt will be generated for you to copy.' +
        '</div>' +
      '</div>';
    return;
  }

  area.innerHTML = '';
  agent.history.forEach(entry => {
    // User message
    const userDiv = document.createElement('div');
    userDiv.className = 'msg msg-user';
    userDiv.innerHTML =
      '<div class="msg-bubble-user">' + escapeHtml(entry.question) + '</div>' +
      '<div class="msg-time">' + formatTime(entry.time) + '</div>';
    area.appendChild(userDiv);

    // Agent prompt response
    const agentDiv = document.createElement('div');
    agentDiv.className = 'msg msg-agent';

    const promptText = buildPrompt(agent, entry.question);
    const copyId = 'copy-' + entry.time.getTime();

    agentDiv.innerHTML =
      '<div class="msg-agent-label">' +
        '<span class="msg-agent-dot" style="background:' + agent.color + '"></span>' +
        '<span style="color:' + agent.color + '">' + agent.name + '</span>' +
        '<span style="color:var(--text-muted);font-weight:400"> generated a prompt</span>' +
      '</div>' +
      '<div class="prompt-block">' +
        '<div class="prompt-block-header">' +
          '<span class="prompt-block-title">COPY-READY PROMPT</span>' +
          '<button class="btn-copy" id="' + copyId + '" onclick="copyPrompt(this)">' +
            '<span class="copy-label">Copy to Clipboard</span>' +
          '</button>' +
        '</div>' +
        '<div class="prompt-block-body">' + escapeHtml(promptText) + '</div>' +
      '</div>' +
      '<div class="msg-time">' + formatTime(entry.time) + '</div>';
    area.appendChild(agentDiv);
  });

  // Scroll to bottom
  requestAnimationFrame(() => {
    area.scrollTop = area.scrollHeight;
  });
}

// ── Build the copy-ready prompt ──
function buildPrompt(agent, question) {
  return 'You are ' + agent.name + ', a specialist in ' + agent.specialty + ' for the ATLAS investment analytics terminal.\n\nContext:\n' + agent.context + '\n\nUser\'s Question:\n' + question + '\n\nPlease provide a detailed, actionable response.';
}

// ── Copy to clipboard ──
function copyPrompt(btn) {
  const body = btn.closest('.prompt-block').querySelector('.prompt-block-body');
  const text = body.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.querySelector('.copy-label').textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('.copy-label').textContent = 'Copy to Clipboard';
    }, 2000);
  });
}

// ── Escape HTML ──
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Send message ──
function sendMessage() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;

  const agent = agents.find(a => a.id === activeAgentId);
  agent.history.push({
    question: text,
    time: new Date()
  });

  input.value = '';
  input.style.height = 'auto';
  renderChat();
  input.focus();
}

// ── Clear chat ──
function clearChat() {
  const agent = agents.find(a => a.id === activeAgentId);
  agent.history = [];
  renderChat();
}

// ── Input: auto-resize and keyboard handling ──
const inputField = document.getElementById('inputField');

inputField.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Init ──
renderSidebar();
renderHeader();
renderChat();
inputField.focus();
</script>
</body>
</html>
