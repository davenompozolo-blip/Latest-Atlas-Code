<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ATLAS Terminal — Institutional Investment Analytics">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ATLAS Terminal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Chart.js 4 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <!-- Supabase JS v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ATLAS Configuration -->
    <script>
        window.ATLAS_CONFIG = window.ATLAS_CONFIG || {};
        const SUPABASE_URL = window.ATLAS_CONFIG.supabaseUrl || 'https://vdmojjszvvcithuxwexx.supabase.co';
        const SUPABASE_KEY = window.ATLAS_CONFIG.supabaseKey || '';
    </script>

    <style>
        /* ============================================
           ATLAS Terminal — Design System & Styles
           ============================================ */

        :root {
            --bg: #070814;
            --card: #0d0f1a;
            --card-border: rgba(255, 255, 255, 0.06);
            --cyan: #00d4ff;
            --indigo: #6366f1;
            --violet: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --text: rgba(255, 255, 255, 0.92);
            --text-sec: rgba(255, 255, 255, 0.52);
            --text-muted: rgba(255, 255, 255, 0.28);
        }

        /* === Reset & Base === */

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* === App Layout === */

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* === Top Bar === */

        .top-bar {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--card);
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .top-bar .logo {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(0, 212, 255, 0.1);
        }

        .top-bar .status {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* === Navigation Bar === */

        .nav-bar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--card-border);
            background: var(--bg);
            flex-shrink: 0;
            overflow-x: auto;
        }

        .nav-tab {
            padding: 12px 24px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sec);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            border-top: none;
            border-left: none;
            border-right: none;
            background: none;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'DM Sans', -apple-system, sans-serif;
        }

        .nav-tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-tab.active {
            color: var(--cyan);
            border-bottom-color: var(--cyan);
        }

        /* === Main Content === */

        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* === Page Title === */

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* === Metrics Row === */

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        /* === Metric Card === */

        .metric-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }

        .metric-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .metric-card .value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
        }

        .metric-card .sub {
            font-size: 12px;
            color: var(--text-sec);
            margin-top: 4px;
        }

        /* === Card === */

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        /* === Data Table === */

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--card-border);
        }

        .data-table td {
            padding: 10px 12px;
            color: var(--text);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-family: 'JetBrains Mono', monospace;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* === Value Colors === */

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .neutral {
            color: var(--amber);
        }

        /* === Badges === */

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.green {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
        }

        .badge.red {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
        }

        .badge.amber {
            background: rgba(245, 158, 11, 0.15);
            color: var(--amber);
        }

        .badge.blue {
            background: rgba(99, 102, 241, 0.15);
            color: var(--indigo);
        }

        /* === Chart Container === */

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 12px;
        }

        /* === Grid Layouts === */

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        /* === Loading Spinner === */

        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading-spinner::after {
            content: '';
            display: block;
            width: 32px;
            height: 32px;
            margin: 16px auto;
            border: 3px solid var(--card-border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* === States === */

        .error-state {
            text-align: center;
            padding: 40px;
            color: var(--red);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        /* === Health Score === */

        .health-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 28px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .health-score.strong {
            border: 3px solid var(--green);
            color: var(--green);
        }

        .health-score.moderate {
            border: 3px solid var(--amber);
            color: var(--amber);
        }

        .health-score.weak {
            border: 3px solid var(--red);
            color: var(--red);
        }

        /* === Donut Container === */

        .donut-container {
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        /* === Custom Scrollbar === */

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* Firefox scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // === ATLAS TERMINAL — React Application ===
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Supabase Client ---
        const sb = SUPABASE_KEY
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
            : null;

        async function loadView(viewName, fallback = []) {
            if (!sb) return fallback;
            try {
                const { data, error } = await sb.from(viewName).select('*');
                if (error) throw error;
                return data && data.length ? data : fallback;
            } catch (e) {
                console.warn('[ATLAS] ' + viewName + ':', e.message);
                return fallback;
            }
        }

        // --- Formatters ---
        function fmt(n, d = 2) { return n != null ? Number(n).toFixed(d) : '\u2014'; }
        function fmtPct(n) { return n != null ? (Number(n) * 100).toFixed(2) + '%' : '\u2014'; }
        function fmtCurrency(n) {
            if (n == null) return '\u2014';
            return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function cls(val) { return val > 0 ? 'positive' : val < 0 ? 'negative' : ''; }
        function badgeCls(tier) {
            const t = (tier || '').toLowerCase();
            if (t.includes('high') || t.includes('downtrend') || t.includes('overbought') || t.includes('needs')) return 'red';
            if (t.includes('moderate') || t.includes('sideways') || t.includes('amber') || t.includes('expanding')) return 'amber';
            if (t.includes('low') || t.includes('uptrend') || t.includes('oversold') || t.includes('strong') || t.includes('compressing')) return 'green';
            return 'blue';
        }
        function healthCls(score) { return score >= 75 ? 'strong' : score >= 50 ? 'moderate' : 'weak'; }

        // --- Mock Data (fallback when no Supabase key) ---
        const MOCK_POSITIONS = [
            { symbol: 'AAPL', name: 'Apple Inc.', quantity: 50, cost_basis: 178.50, current_price: 195.20, market_value: 9760, unrealised_return_pct: 0.0936, portfolio_weight: 0.082, annualised_vol: 0.28, sharpe_approx: 1.2, is_concentrated: false },
            { symbol: 'MSFT', name: 'Microsoft Corp', quantity: 30, cost_basis: 380.00, current_price: 425.80, market_value: 12774, unrealised_return_pct: 0.1205, portfolio_weight: 0.107, annualised_vol: 0.25, sharpe_approx: 1.5, is_concentrated: true },
            { symbol: 'NVDA', name: 'NVIDIA Corp', quantity: 20, cost_basis: 650.00, current_price: 890.50, market_value: 17810, unrealised_return_pct: 0.3700, portfolio_weight: 0.149, annualised_vol: 0.52, sharpe_approx: 2.1, is_concentrated: true },
            { symbol: 'GOOGL', name: 'Alphabet Inc.', quantity: 40, cost_basis: 140.00, current_price: 162.30, market_value: 6492, unrealised_return_pct: 0.1593, portfolio_weight: 0.054, annualised_vol: 0.30, sharpe_approx: 0.9, is_concentrated: false },
        ];
        const MOCK_COMMAND = { portfolio_nav: 119500, total_invested: 98000, total_return_pct: 0.2194, sharpe_ratio: 1.35, sortino_ratio: 1.82, drawdown_pct: -8.4, dollar_var_95: 2850, atlas_health_score: 72, portfolio_health_status: 'Moderate', position_count: 55, days_of_history: 420, computed_at: new Date().toISOString() };

        // --- Loading Component ---
        function Loading({ text }) {
            return React.createElement('div', { className: 'loading-spinner' }, text || 'Loading data...');
        }

        // --- Empty State ---
        function EmptyState({ message }) {
            return React.createElement('div', { className: 'empty-state' },
                React.createElement('div', { style: { fontSize: 36, marginBottom: 12 } }, '\u26A0'),
                React.createElement('div', null, message || 'No data available \u2014 run Alpaca sync first')
            );
        }

        // --- Config Prompt (shown when no Supabase key) ---
        function ConfigPrompt() {
            return React.createElement('div', { style: { textAlign: 'center', padding: '80px 24px' } },
                React.createElement('div', { style: { fontFamily: 'Syne', fontSize: 32, fontWeight: 800, color: '#00d4ff', marginBottom: 16 } }, 'ATLAS TERMINAL'),
                React.createElement('div', { style: { color: 'rgba(255,255,255,0.52)', marginBottom: 32, maxWidth: 480, margin: '0 auto 32px' } },
                    'Running in demo mode. To connect to live Supabase data, set your anon key:'),
                React.createElement('pre', { style: { background: '#0d0f1a', border: '1px solid rgba(255,255,255,0.06)', borderRadius: 8, padding: 20, textAlign: 'left', maxWidth: 600, margin: '0 auto', fontSize: 13, fontFamily: 'JetBrains Mono', color: 'rgba(255,255,255,0.7)', overflowX: 'auto' } },
                    '\x3Cscript\x3E\nwindow.ATLAS_CONFIG = {\n  supabaseKey: "your-anon-key-here"\n};\n\x3C/script\x3E'),
                React.createElement('div', { style: { color: 'rgba(255,255,255,0.28)', marginTop: 20, fontSize: 12 } }, 'Add the script block above BEFORE the terminal script tag, or deploy with environment injection.')
            );
        }

        // ============================================================
        // TAB 1: PORTFOLIO HOME
        // ============================================================
        function PortfolioHome() {
            const [positions, setPositions] = useState(null);
            const [command, setCommand] = useState(null);
            const [loading, setLoading] = useState(true);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                Promise.all([
                    loadView('vw_portfolio_home', MOCK_POSITIONS),
                    loadView('vw_command_centre', [MOCK_COMMAND])
                ]).then(([pos, cmd]) => {
                    setPositions(pos);
                    setCommand(cmd[0] || MOCK_COMMAND);
                    setLoading(false);
                });
            }, []);

            useEffect(() => {
                if (!positions || !chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const top10 = positions.slice(0, 10);
                chartInstance.current = new Chart(chartRef.current, {
                    type: 'doughnut',
                    data: {
                        labels: top10.map(p => p.symbol),
                        datasets: [{
                            data: top10.map(p => Number(p.market_value) || 0),
                            backgroundColor: ['#00d4ff', '#6366f1', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#14b8a6', '#f97316', '#a855f7'],
                            borderWidth: 0

                    },
                    options: {

                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [positions]);

            if (loading) return React.createElement(Loading, null);
            const c = command || MOCK_COMMAND;

            return React.createElement('div', null,
                React.createElement('div', { className: 'page-title' }, 'Portfolio Home'),
                // Metrics Row
                React.createElement('div', { className: 'metrics-row' },
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Portfolio NAV'),
                        React.createElement('div', { className: 'value' }, fmtCurrency(c.portfolio_nav)),
                        React.createElement('div', { className: 'sub' }, 'Total invested: ' + fmtCurrency(c.total_invested))
                    ),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Total Return'),
                        React.createElement('div', { className: 'value ' + cls(c.total_return_pct) }, fmtPct(c.total_return_pct)),
                        React.createElement('div', { className: 'sub' }, 'Sharpe: ' + fmt(c.sharpe_ratio))
                    ),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Positions'),
                        React.createElement('div', { className: 'value' }, c.position_count || positions.length),
                        React.createElement('div', { className: 'sub' }, (c.days_of_history || 0) + ' days of history')
                    ),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Health Score'),
                        React.createElement('div', { className: 'health-score ' + healthCls(c.atlas_health_score), style: { marginTop: 4 } }, Math.round(c.atlas_health_score || 0)),
                        React.createElement('div', { className: 'sub' }, c.portfolio_health_status || '')
                    )
                ),
                // Two-column layout
                React.createElement('div', { className: 'grid-2' },
                    // Positions Table
                    React.createElement('div', { className: 'card', style: { gridColumn: '1 / -1' } },
                        React.createElement('div', { className: 'card-title' }, 'Positions (' + positions.length + ')'),
                        React.createElement('div', { style: { overflowX: 'auto' } },
                            React.createElement('table', { className: 'data-table' },
                                React.createElement('thead', null,
                                    React.createElement('tr', null,
                                        ['Symbol', 'Name', 'Qty', 'Avg Cost', 'Price', 'Mkt Value', 'Return %', 'Weight %', 'Vol', 'Sharpe'].map(h =>
                                            React.createElement('th', { key: h }, h)
                                        )
                                    )
                                ),
                                React.createElement('tbody', null,
                                    positions.map(p =>
                                        React.createElement('tr', { key: p.symbol },
                                            React.createElement('td', { style: { fontWeight: 600, color: '#00d4ff' } },
                                                p.symbol, p.is_concentrated ? React.createElement('span', { className: 'badge amber', style: { marginLeft: 6, fontSize: 9 } }, 'CONC') : null),
                                            React.createElement('td', { style: { fontFamily: 'DM Sans', color: 'rgba(255,255,255,0.6)' } }, p.name),
                                            React.createElement('td', null, fmt(p.quantity, 0)),
                                            React.createElement('td', null, fmtCurrency(p.cost_basis)),
                                            React.createElement('td', null, fmtCurrency(p.current_price)),
                                            React.createElement('td', null, fmtCurrency(p.market_value)),
                                            React.createElement('td', { className: cls(p.unrealised_return_pct) }, fmtPct(p.unrealised_return_pct)),
                                            React.createElement('td', null, fmtPct(p.portfolio_weight)),
                                            React.createElement('td', null, fmt(p.annualised_vol)),
                                            React.createElement('td', null, fmt(p.sharpe_approx))
                                        )
                                    )
                                )
                            )
                        )
                    ),
                    // Allocation Chart
                    React.createElement('div', { className: 'card', style: { gridColumn: '1 / -1' } },
                        React.createElement('div', { className: 'card-title' }, 'Portfolio Allocation (Top 10)'),
                        React.createElement('div', { className: 'chart-container', style: { height: 280 } },
                            React.createElement('canvas', { ref: chartRef })
                        )
                    )
                )
            );
        }

        // ============================================================
        // TAB 2: QUANT DASHBOARD
        // ============================================================
        function QuantDashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadView('vw_quant_dashboard', []).then(d => { setData(d); setLoading(false); });
            }, []);

            if (loading) return React.createElement(Loading, null);
            if (!data || !data.length) return React.createElement(EmptyState, null);

            const uptrend = data.filter(d => d.price_regime === 'Uptrend').length;
            const downtrend = data.filter(d => d.price_regime === 'Downtrend').length;
            const sideways = data.filter(d => d.price_regime === 'Sideways').length;
            const overbought = data.filter(d => d.mean_reversion_signal === 'Overbought').length;
            const oversold = data.filter(d => d.mean_reversion_signal === 'Oversold').length;

            return React.createElement('div', null,
                React.createElement('div', { className: 'page-title' }, 'Quant Dashboard'),
                React.createElement('div', { className: 'metrics-row' },
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Uptrend'), React.createElement('div', { className: 'value positive' }, uptrend)),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Downtrend'), React.createElement('div', { className: 'value negative' }, downtrend)),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Sideways'), React.createElement('div', { className: 'value neutral' }, sideways)),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Overbought'), React.createElement('div', { className: 'value negative' }, overbought)),
                    React.createElement('div', { className: 'metric-card' },
                        React.createElement('div', { className: 'label' }, 'Oversold'), React.createElement('div', { className: 'value positive' }, oversold))
                ),
                React.createElement('div', { className: 'card' },
                    React.createElement('div', { className: 'card-title' }, 'Market Regime & Signals (' + data.length + ' positions)'),
                    React.createElement('div', { style: { overflowX: 'auto' } },
                        React.createElement('table', { className: 'data-table' },
                            React.createElement('thead', null,
                                React.createElement('tr', null,
                                    ['Symbol', 'Price', 'MA20', 'MA50', 'MA200', 'Regime', 'Vol Regime', 'Z-Score', 'Signal', 'Momentum %'].map(h =>
                                        React.createElement('th', { key: h }, h)))),
                            React.createElement('tbody', null,
                                data.map(d =>
                                    React.createElement('tr', { key: d.symbol },
                                        React.createElement('td', { style: { fontWeight: 600, color: '#00d4ff' } }, d.symbol),
                                        React.createElement('td', null, fmtCurrency(d.current_price)),
