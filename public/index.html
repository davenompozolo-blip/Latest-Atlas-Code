<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ATLAS Terminal — Institutional Investment Analytics">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ATLAS Terminal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Chart.js 4 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <!-- Plotly.js — advanced charts (waterfall, area, treemap, sunburst) -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>

    <!-- TradingView lightweight-charts — high-performance financial time-series -->
    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>

    <!-- Supabase JS v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ATLAS Configuration — see public/js/config.js.
         Set window.ATLAS_CONFIG here BEFORE the module entry point loads
         if you want to inject a Supabase anon key from the browser.
         (Vercel builds inject the key directly into public/js/config.js.) -->

    <style>
        /* ============================================
           ATLAS Terminal — Design System & Styles
           ============================================ */

        :root {
            --bg: #070814;
            --card: #0d0f1a;
            --card-border: rgba(255, 255, 255, 0.06);
            --cyan: #00d4ff;
            --indigo: #6366f1;
            --violet: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --text: rgba(255, 255, 255, 0.92);
            --text-sec: rgba(255, 255, 255, 0.52);
            --text-muted: rgba(255, 255, 255, 0.28);
        }

        /* === Reset & Base === */

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* === App Layout === */

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* === Top Bar === */

        .top-bar {
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--card);
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
            gap: 20px;
        }

        .top-bar .logo {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 5px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(0, 212, 255, 0.1);
        }

        .top-bar .logo-sub {
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

        .top-bar .nav-summary {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .top-bar .nav-pnl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
        }

        .top-bar .sparkline-container {
            width: 120px;
            height: 32px;
        }

        .top-bar .spacer { flex: 1; }

        .top-bar .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }

        .top-bar .status-badge.live {
            background: rgba(16, 185, 129, 0.12);
            color: var(--green);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .top-bar .status-badge.demo {
            background: rgba(245, 158, 11, 0.12);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        .top-bar .sync-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10.5px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.55);
        }
        .top-bar .sync-pill.ok    { color: var(--green); border-color: rgba(16,185,129,0.25); background: rgba(16,185,129,0.08); }
        .top-bar .sync-pill.warn  { color: var(--amber); border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.08); }
        .top-bar .sync-pill.err   { color: #f87171;      border-color: rgba(239,68,68,0.3);   background: rgba(239,68,68,0.08); }
        .top-bar .sync-pill .dot  { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; animation: glowPulse 2s ease-in-out infinite; }

        .top-bar .date {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* === Body Layout (sidebar + content) === */

        .body-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* === Left Sidebar Nav === */

        .sidebar {
            width: 180px;
            background: var(--card);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 16px 0;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border: none;
            background: none;
            text-align: left;
            transition: all 0.15s ease;
            border-left: 3px solid transparent;
            font-family: 'DM Sans', sans-serif;
        }

        .nav-item:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-item.active {
            color: var(--cyan);
            border-left-color: var(--cyan);
            background: rgba(0, 212, 255, 0.05);
        }

        .nav-item .nav-icon {
            font-size: 14px;
            width: 18px;
            text-align: center;
            opacity: 0.7;
        }

        .nav-item.active .nav-icon { opacity: 1; }

        .nav-item .nav-label {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .nav-item .nav-sublabel {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
        }

        /* === Main Content === */

        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* === Content with Right Sidebar === */

        .content-with-sidebar {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        .content-primary { min-width: 0; }
        .content-sidebar { min-width: 0; }

        @media (max-width: 1100px) {
            .content-with-sidebar {
                grid-template-columns: 1fr;
            }
            .sidebar { display: none; }
        }

        /* === Page Title === */

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* === Metrics Row === */

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        /* === Animations === */

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(0, 212, 255, 0.1); }
            50%      { box-shadow: 0 0 20px rgba(0, 212, 255, 0.25); }
        }

        /* === Metric Card === */

        .metric-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            animation: fadeInUp 0.5s ease-out both;
            transition: transform 0.2s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 212, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 12px rgba(0, 212, 255, 0.08);
        }

        .metric-card:nth-child(1) { animation-delay: 0.0s; }
        .metric-card:nth-child(2) { animation-delay: 0.08s; }
        .metric-card:nth-child(3) { animation-delay: 0.16s; }
        .metric-card:nth-child(4) { animation-delay: 0.24s; }
        .metric-card:nth-child(5) { animation-delay: 0.32s; }

        .metric-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .metric-card .value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
        }

        .metric-card .sub {
            font-size: 12px;
            color: var(--text-sec);
            margin-top: 4px;
        }

        /* === Card === */

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease-out both;
            animation-delay: 0.15s;
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        /* === Data Table === */

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--card-border);
        }

        .data-table td {
            padding: 10px 12px;
            color: var(--text);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-family: 'JetBrains Mono', monospace;
        }

        .data-table tbody tr {
            animation: fadeIn 0.3s ease-out both;
            transition: background 0.15s ease;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* === Value Colors === */

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .neutral {
            color: var(--amber);
        }

        /* === Badges === */

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.green {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
        }

        .badge.red {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
        }

        .badge.amber {
            background: rgba(245, 158, 11, 0.15);
            color: var(--amber);
        }

        .badge.blue {
            background: rgba(99, 102, 241, 0.15);
            color: var(--indigo);
        }

        /* === Chart Container === */

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 12px;
        }

        /* === Grid Layouts === */

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        /* === Loading Spinner === */

        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .loading-spinner::after {
            content: '';
            display: block;
            width: 32px;
            height: 32px;
            margin: 16px auto;
            border: 3px solid var(--card-border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* === States === */

        .error-state {
            text-align: center;
            padding: 40px;
            color: var(--red);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        /* === Health Score === */

        .health-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 28px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .health-score.strong {
            border: 3px solid var(--green);
            color: var(--green);
        }

        .health-score.moderate {
            border: 3px solid var(--amber);
            color: var(--amber);
        }

        .health-score.weak {
            border: 3px solid var(--red);
            color: var(--red);
        }

        /* === Donut Container === */

        .donut-container {
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        /* === Custom Scrollbar === */

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* Firefox scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        /* === Column Manager === */

        .col-manager-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .col-toggle {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--text-sec);
            font-family: 'DM Sans', sans-serif;
            transition: all 0.15s ease;
        }

        .col-toggle.active {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
            color: var(--cyan);
        }

        .col-toggle:hover {
            border-color: rgba(255,255,255,0.15);
        }

        /* === Nav Section Headers === */

        .nav-section-header {
            padding: 18px 20px 6px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

        .nav-section-header:first-child {
            padding-top: 4px;
        }

        .nav-item.disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        /* === Quality Score Badge === */

        .quality-pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        .quality-pill.high { background: rgba(16,185,129,0.15); color: var(--green); }
        .quality-pill.mid  { background: rgba(245,158,11,0.15); color: var(--amber); }
        .quality-pill.low  { background: rgba(239,68,68,0.15);  color: var(--red); }

        /* === Quant Dashboard — view tabs === */

        .view-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
            padding: 0 4px;
        }

        .view-tab {
            padding: 10px 18px;
            cursor: pointer;
            color: var(--text-sec);
            border-bottom: 2px solid transparent;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.15s ease, border-color 0.15s ease;
            user-select: none;
        }

        .view-tab:hover { color: var(--text); }

        .view-tab.active {
            color: var(--cyan);
            border-bottom-color: var(--cyan);
        }

        .view-tab .count-pill {
            display: inline-block;
            margin-left: 8px;
            padding: 1px 7px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .view-tab.active .count-pill {
            background: rgba(0,212,255,0.12);
            color: var(--cyan);
        }

        /* === Quant Dashboard — correlation heatmap === */

        .corr-heatmap-wrap {
            overflow: auto;
            max-height: 560px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
        }

        .corr-heatmap {
            border-collapse: collapse;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .corr-heatmap th,
        .corr-heatmap td {
            padding: 4px 6px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
            min-width: 44px;
            white-space: nowrap;
        }

        .corr-heatmap th {
            background: var(--card);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 10px;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .corr-heatmap th.row-label {
            position: sticky;
            left: 0;
            z-index: 3;
            color: var(--cyan);
            text-align: left;
            padding-left: 10px;
        }

        .corr-heatmap td.row-label {
            position: sticky;
            left: 0;
            background: var(--card);
            color: var(--cyan);
            font-weight: 600;
            text-align: left;
            padding-left: 10px;
            z-index: 1;
        }

        .corr-heatmap td.diag {
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
        }

        /* === Quant Dashboard — drawdown bar === */

        .dd-bar-wrap {
            position: relative;
            display: inline-block;
            width: 80px;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
            vertical-align: middle;
            margin-left: 8px;
        }

        .dd-bar {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--amber), var(--red));
            border-radius: 3px;
        }

        /* === Quant Dashboard — RSI sparkline gauge === */

        .rsi-gauge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .rsi-gauge .rsi-track {
            position: relative;
            width: 56px;
            height: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }

        .rsi-gauge .rsi-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            border-radius: 3px;
        }

        /* === Quant Dashboard — return chip (rolling returns matrix) === */

        .ret-chip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            min-width: 56px;
            text-align: right;
        }

        /* === Narrative insight strip === */

        .narrative-strip {
            background: linear-gradient(135deg, rgba(0,212,255,0.04), rgba(99,102,241,0.04));
            border: 1px solid rgba(0,212,255,0.12);
            border-left: 3px solid var(--cyan);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .narrative-line {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: var(--text);
            line-height: 1.55;
        }

        .narrative-icon {
            color: var(--cyan);
            font-size: 11px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .narrative-text strong { color: var(--cyan); font-weight: 600; }
        .narrative-text .pos   { color: var(--green); font-weight: 600; }
        .narrative-text .neg   { color: var(--red);   font-weight: 600; }
        .narrative-text .neu   { color: var(--amber); font-weight: 600; }
        .narrative-text .mono  { font-family: 'JetBrains Mono', monospace; }

        /* === Chart panes === */

        .chart-pane {
            position: relative;
            height: 220px;
            margin-top: 8px;
        }

        .chart-pane.tall { height: 320px; }
        .chart-pane.short { height: 160px; }

        /* === Stacked bar (regime distribution) === */

        .stacked-bar {
            display: flex;
            width: 100%;
            height: 18px;
            border-radius: 4px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
            margin: 8px 0 4px;
        }
        .stacked-bar > .seg {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            transition: filter 0.15s ease;
        }
        .stacked-bar > .seg:hover { filter: brightness(1.25); }

        .stacked-bar-legend {
            display: flex;
            gap: 14px;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .stacked-bar-legend .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            margin-right: 6px;
            vertical-align: middle;
        }

        /* === Inline mini-bar (used inside table rows) === */
        .inline-bar-cell {
            position: relative;
            min-width: 110px;
        }
        .inline-bar-cell .ib-track {
            position: absolute;
            left: 0; right: 0; bottom: 4px;
            height: 3px;
            background: rgba(255,255,255,0.04);
            border-radius: 2px;
            overflow: hidden;
        }
        .inline-bar-cell .ib-fill {
            position: absolute;
            top: 0; bottom: 0;
            border-radius: 2px;
        }

        /* ================================================
           HERO CARD — gradient metric card with accent line
           Used on Portfolio Home, Risk, Performance, Quant,
           Command Centre. Replaces flat .metric-card for
           primary KPI tiles.
           ================================================ */

        .hero-card {
            position: relative;
            overflow: hidden;
            padding: 18px 20px 16px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: var(--card);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            animation: fadeInUp 0.5s ease-out both;
        }

        .hero-card::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
        }

        /* Accent colour variants */
        .hero-card.accent-cyan   { background: linear-gradient(145deg, rgba(0,212,255,0.07) 0%, var(--card) 55%);   border-color: rgba(0,212,255,0.14); }
        .hero-card.accent-cyan::before   { background: linear-gradient(90deg, #00d4ff, rgba(0,212,255,0.15)); }

        .hero-card.accent-green  { background: linear-gradient(145deg, rgba(16,185,129,0.07) 0%, var(--card) 55%);  border-color: rgba(16,185,129,0.14); }
        .hero-card.accent-green::before  { background: linear-gradient(90deg, #10b981, rgba(16,185,129,0.15)); }

        .hero-card.accent-red    { background: linear-gradient(145deg, rgba(239,68,68,0.07) 0%, var(--card) 55%);   border-color: rgba(239,68,68,0.14); }
        .hero-card.accent-red::before    { background: linear-gradient(90deg, #ef4444, rgba(239,68,68,0.15)); }

        .hero-card.accent-amber  { background: linear-gradient(145deg, rgba(245,158,11,0.07) 0%, var(--card) 55%);  border-color: rgba(245,158,11,0.14); }
        .hero-card.accent-amber::before  { background: linear-gradient(90deg, #f59e0b, rgba(245,158,11,0.15)); }

        .hero-card.accent-violet { background: linear-gradient(145deg, rgba(139,92,246,0.07) 0%, var(--card) 55%);  border-color: rgba(139,92,246,0.14); }
        .hero-card.accent-violet::before { background: linear-gradient(90deg, #8b5cf6, rgba(139,92,246,0.15)); }

        .hero-card.accent-indigo { background: linear-gradient(145deg, rgba(99,102,241,0.07) 0%, var(--card) 55%);  border-color: rgba(99,102,241,0.14); }
        .hero-card.accent-indigo::before { background: linear-gradient(90deg, #6366f1, rgba(99,102,241,0.15)); }

        .hero-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.35);
        }

        .hero-card .hc-icon {
            font-size: 13px;
            margin-bottom: 7px;
            opacity: 0.5;
            display: block;
            line-height: 1;
        }

        .hero-card .hc-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }

        .hero-card .hc-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.15;
            margin-bottom: 8px;
        }

        .hero-card .hc-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

        .hero-card .hc-badge.b-excellent { background: rgba(16,185,129,0.15);  color: var(--green); }
        .hero-card .hc-badge.b-good      { background: rgba(99,102,241,0.15);  color: #818cf8; }
        .hero-card .hc-badge.b-fair      { background: rgba(245,158,11,0.15);  color: var(--amber); }
        .hero-card .hc-badge.b-poor      { background: rgba(239,68,68,0.15);   color: var(--red); }

        .hero-card .hc-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            font-family: 'DM Sans', sans-serif;
        }

        /* nth-child stagger for hero grid rows */
        .hero-grid .hero-card:nth-child(1) { animation-delay: 0.00s; }
        .hero-grid .hero-card:nth-child(2) { animation-delay: 0.06s; }
        .hero-grid .hero-card:nth-child(3) { animation-delay: 0.12s; }
        .hero-grid .hero-card:nth-child(4) { animation-delay: 0.18s; }
        .hero-grid .hero-card:nth-child(5) { animation-delay: 0.24s; }
        .hero-grid .hero-card:nth-child(6) { animation-delay: 0.30s; }
        .hero-grid .hero-card:nth-child(7) { animation-delay: 0.36s; }
        .hero-grid .hero-card:nth-child(8) { animation-delay: 0.42s; }
    </style>
</head>
<body>
    <!-- Visible error fallback — shows on screen if the JS module graph fails to load -->
    <div id="js-error-banner" style="display:none;position:fixed;inset:0;background:#070814;color:#ef4444;font-family:monospace;padding:40px;z-index:9999;overflow:auto;">
        <div style="font-size:18px;font-weight:700;margin-bottom:16px;">&#x26A0; ATLAS Terminal &#x2014; JavaScript Load Error</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:24px;">The module graph failed to initialise. Copy the error below and report it.</div>
        <pre id="js-error-detail" style="font-size:11px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:16px;white-space:pre-wrap;color:#fca5a5;"></pre>
    </div>
    <script>
        window.addEventListener('error', function(e) {
            var b = document.getElementById('js-error-banner');
            var d = document.getElementById('js-error-detail');
            if (b && d) { b.style.display = 'block'; d.textContent += (e.filename || '') + ':' + e.lineno + '\n' + (e.message || '') + '\n\n'; }
        });
        window.addEventListener('unhandledrejection', function(e) {
            var b = document.getElementById('js-error-banner');
            var d = document.getElementById('js-error-detail');
            if (b && d) { b.style.display = 'block'; d.textContent += 'Unhandled promise rejection:\n' + (e.reason || e) + '\n\n'; }
        });
        var __hideOnMount = setInterval(function() {
            if (document.getElementById('root') && document.getElementById('root').children.length > 0) {
                var b = document.getElementById('js-error-banner');
                if (b) b.style.display = 'none';
                clearInterval(__hideOnMount);
            }
        }, 500);
    </script>

    <div id="root"></div>

    <!-- ES-module entry point. app.js loads the full module graph:
         config → utils → components → pages → app shell → mount. -->
    <script type="module" src="js/app.js?v=5"></script>

</body>
</html>
